# Firebase App Hosting configuration.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0
  maxInstances: 4
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: SNAPSHOT_INTERVAL_HOURS
    value: "0.5"
    availability:
      - RUNTIME

  # Provide the service-account JSON as a Secret Manager secret in production:
  # - variable: FIREBASE_SERVICE_ACCOUNT
  #   secret: firebase-service-account
  #   availability:
  #     - RUNTIME
