services:
  radeon-arena:
    build:
      context: .
      dockerfile: Dockerfile
    image: radeon-arena:latest
    container_name: radeon-arena
    restart: unless-stopped
    ports:
      - "13000:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
