log_format radeon_event '$time_iso8601 $remote_addr $http_cf_connecting_ip $http_cf_ipcountry $request_method $status $request_time $args $http_referer $http_user_agent';

server {
    server_name radeon-arena.com www.radeon-arena.com;
    access_log /var/log/nginx/radeon-arena.com.access.log cfcombined;
    access_log /var/log/nginx/aop-rollout.log aop_test;
    error_log  /var/log/nginx/radeon-arena.com.error.log;
    server_tokens off;
    include /etc/nginx/cloudflare-ips.conf;

    root /var/www/radeon-arena;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location ~* (?:^|/)(?:wp-(?:admin|login|content|includes|json)|wordpress|xmlrpc\.php|wlwmanifest\.xml)(?:[./]|$) {
        access_log off;
        return 404;
    }
    location ~* (?:^|/)\.(?:env|git|aws|svn|hg|DS_Store)(?:[./]|$) {
        access_log off;
        return 404;
    }
    location ~* (?:^|/)(?:vendor|phpunit|phpinfo|phpmyadmin|adminer|boaform|actuator|setup\.php|info\.php|test\.php|web\.config|composer\.(?:json|lock))(?:[./]|$) {
        access_log off;
        return 404;
    }

    location = /event {
        access_log /var/log/nginx/radeon-arena.com.events.log radeon_event;
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin "https://radeon-arena.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
        return 204;
    }

    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri/index.html $uri.html $uri =404;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/radeon-arena.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/radeon-arena.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    ssl_client_certificate /etc/nginx/certs/cloudflare-origin-pull-ca.pem;
    ssl_verify_client on;
    ssl_verify_depth 1;
}

server {
    if ($host = www.radeon-arena.com) {
        return 301 https://$host$request_uri;
    }

    if ($host = radeon-arena.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name radeon-arena.com www.radeon-arena.com;
    return 404;
}
